# Force Node.js provider for Railway deployment
# Disable auto-detection to prevent duplicate npm ci
providers = []

[phases.setup]
nixPkgs = ["nodejs"]

[phases.install]
cmds = ["cd backend && npm ci --include=dev"]

[phases.build]
dependsOn = ["install"]
cmds = ["cd backend && npm run build"]

[start]
cmd = "cd backend && npm run start"
