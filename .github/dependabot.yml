version: 2
updates:
  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      # Clerk Core 3 (clerk-react v6) is a coordinated cross-SDK migration via the
      # @clerk/upgrade CLI, not a dep bump — it breaks the frontend test suite
      # (useAuthenticatedApi + Clerk middleware). Core 2 is actively maintained and
      # receives security backports, so decline majors; in-major patches still flow.
      # NOTE: update-types only suppresses *version* updates — *security* update PRs
      # are unaffected, so a CVE fixable only in a major will still surface.
      - dependency-name: "@clerk/clerk-react"
        update-types: ["version-update:semver-major"]
      # Pin @types/node to the runtime major (Node 22, see ci.yml). Types ahead of
      # the runtime typecheck against APIs that don't exist at runtime.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # Recharts 3 is a deliberate migration, not a dep bump — breaking changes in
      # custom content renderers, tooltip/legend APIs hit our dashboard charts
      # (Treemap renderers, chart-color tokens). Declined 5x as one-off PRs
      # (#33, #84, #115, #328, #346); scheduled as part of the dashboard redesign
      # roadmap instead. 2.x minors/patches still flow; security PRs still surface.
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
    groups:
      # Group minor/patch updates to reduce PR noise
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  # Backend dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      # ES server is 8.17 — v9 client sends incompatible headers (compatible-with=9)
      - dependency-name: "@elastic/elasticsearch"
        update-types: ["version-update:semver-major"]
      # Clerk Core 3 (backend v3 / express v2) is a coordinated cross-SDK migration,
      # not a dep bump — it breaks the frontend test suite. Core 2 is actively
      # maintained with security backports, so decline majors; in-major patches flow.
      # update-types blocks only *version* updates — *security* update PRs still fire.
      - dependency-name: "@clerk/backend"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@clerk/express"
        update-types: ["version-update:semver-major"]
      # Pin @types/node to the runtime major (Node 22) — see /frontend block.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  # Backend serverless dependencies (Vercel/Turso fork)
  - package-ecosystem: "npm"
    directory: "/backend-serverless"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "@elastic/elasticsearch"
        update-types: ["version-update:semver-major"]
      # Clerk Core 3 majors — see /backend block above for rationale.
      - dependency-name: "@clerk/backend"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@clerk/express"
        update-types: ["version-update:semver-major"]
      # Pin @types/node to the runtime major (Node 22) — see /frontend block.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  # Blog dependencies (Next.js static blog, added Jul 2026)
  - package-ecosystem: "npm"
    directory: "/blog"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  # Go agent dependencies
  - package-ecosystem: "gomod"
    directory: "/agent"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
