name: Security Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "backend/src/**"
      - "frontend/src/**"
      - "agent/**/*.go"
      - "backend/package*.json"
      - "frontend/package*.json"
      - ".env*"
      - "Dockerfile*"
      - "docker-compose*"
      - ".github/workflows/**"

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript --config p/typescript --config p/nodejs \
            --config p/react --config p/express \
            --config p/owasp-top-ten --config p/security-audit \
            --config p/secrets --config p/golang \
            --config p/dockerfile --config p/github-actions \
            --config .semgrep/rules/ \
            --json --output semgrep-results.json \
            backend/src frontend/src agent/ .github/ \
            || true

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semgrep-results
          path: semgrep-results.json

      - name: Post findings summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let body = '## Semgrep SAST Results\n\n';

            try {
              const raw = fs.readFileSync('semgrep-results.json', 'utf8');
              const data = JSON.parse(raw);
              const results = data.results || [];

              if (results.length === 0) {
                body += '**No security findings.** All checks passed.\n';
              } else {
                body += `**${results.length} finding(s) detected:**\n\n`;
                body += '| Severity | Rule | File | Line |\n';
                body += '|----------|------|------|------|\n';
                for (const r of results.slice(0, 25)) {
                  const sev = (r.extra?.severity || 'unknown').toUpperCase();
                  const rule = r.check_id?.split('.').pop() || r.check_id;
                  const file = r.path;
                  const line = r.start?.line || '?';
                  body += `| ${sev} | ${rule} | \`${file}\` | ${line} |\n`;
                }
                if (results.length > 25) {
                  body += `\n_...and ${results.length - 25} more. See full SARIF artifact._\n`;
                }
              }
            } catch (e) {
              body += `Scan completed but results could not be parsed: ${e.message}\n`;
              body += 'Download the SARIF artifact for full results.\n';
            }

            // Find and update existing comment, or create new one
            const marker = '<!-- semgrep-results -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Audit backend dependencies
        run: npm audit --audit-level=moderate
        working-directory: backend
        continue-on-error: true

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate
        working-directory: frontend
        continue-on-error: true

  claude-security-review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run Claude Security Review
        uses: anthropics/claude-code-action@970cf56ff574f7f75cfb3b2394c8b723c3410247 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the changes in this PR for security vulnerabilities. Focus on:

            1. **Command Injection**: execFile/spawn calls with user input, shell metacharacters
            2. **Path Traversal**: path.join/path.resolve with user-controlled segments without path.basename sanitization
            3. **Authentication Bypass**: Missing requireClerkAuth middleware on new route files, timing oracles, token enumeration
            4. **Cryptographic Issues**: Weak KDF, AES-256-GCM IV reuse, missing auth tag verification, hardcoded secrets
            5. **Input Validation**: Unsanitized user input in queries, commands, file paths
            6. **XSS**: dangerouslySetInnerHTML, unsanitized rendering
            7. **SSRF**: URL handling without validation (git URLs, Elasticsearch URLs)
            8. **File Upload**: Missing MIME validation, oversized uploads without limits
            9. **Information Disclosure**: Verbose errors with stack traces in production, credential leaks in responses
            10. **Fail-Open Defaults**: process.env fallbacks with insecure literal defaults for SECRET/KEY/TOKEN/PASSWORD variables
            11. **SQL Injection**: String concatenation in SQLite queries instead of parameterized statements
            12. **Argument Injection**: User-controlled values passed to execFile/spawn without regex validation

            For each finding, include:
            - Severity (Critical/High/Medium/Low)
            - OWASP category
            - File and line number
            - Description and impact
            - Recommended fix

            If no security issues are found, confirm the PR passes security review.
