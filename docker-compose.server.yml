# =============================================================================
# ProjectAchilles — Public / on-prem single-server stack
# =============================================================================
# Purpose-built compose file for a publicly-reachable OR on-prem install behind
# a Caddy reverse proxy that terminates TLS. Unlike docker-compose.yml (which
# binds app ports to 127.0.0.1 for local dev), here ONLY Caddy is exposed to the
# network; backend, frontend, and Elasticsearch stay on the internal compose
# network.
#
# Driven by scripts/deploy-server.sh, which generates the root .env and renders
# deploy/caddy/tls.caddy. You can also run it directly:
#
#   docker compose -f docker-compose.server.yml up -d --build
#   docker compose -f docker-compose.server.yml --profile elasticsearch up -d --build
#
# All ${VARS} below are read from the root .env file written by the deploy script.
# =============================================================================

services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2.10.0-alpine}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      - ACHILLES_DOMAIN=${ACHILLES_DOMAIN:?set ACHILLES_DOMAIN in .env}
      - ACME_EMAIL=${ACME_EMAIL:-}
      - CADDY_DNS_PROVIDER=${CADDY_DNS_PROVIDER:-}
      - CADDY_DNS_TOKEN=${CADDY_DNS_TOKEN:-}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy/tls.caddy:/etc/caddy/tls.caddy:ro
      - ./deploy/caddy/certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/", "--spider"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "3000"
    # All app config (Clerk, secrets, CORS_ORIGIN, AGENT_SERVER_URL, and the
    # Elasticsearch settings — self-hosted node OR Elastic Cloud) is written to
    # backend/.env by scripts/deploy-server.sh. Single source of truth.
    env_file: ./backend/.env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - AGENT_SOURCE_PATH=/agent-src
    volumes:
      - achilles-data:/root/.projectachilles
      - repo-cache:/app/data
      - go-cache:/root/go
      - ./agent:/agent-src:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    environment:
      # Same-origin: empty VITE_API_URL makes the SPA call /api on this host,
      # which nginx proxies to backend:3000 internally.
      - VITE_API_URL=
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY:-}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY:-${CLERK_PUBLISHABLE_KEY:-}}
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Optional self-hosted Elasticsearch (TLS_ES=self).
  # Activate with: --profile elasticsearch
  # Stays on the internal network only — never published to the host/internet.
  # Use Elastic Cloud instead by setting ELASTICSEARCH_CLOUD_ID/API_KEY in
  # backend/.env and omitting this profile.
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    profiles: ["elasticsearch"]
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      # Security disabled is acceptable here ONLY because ES is not exposed
      # outside the compose network. Do not publish port 9200.
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx1024m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - "9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  # One-shot seed: creates the index + ~1000 synthetic records, then exits.
  # Runs only with --profile elasticsearch, and only when SEED_ES=true (set in
  # the root .env). It is a no-op otherwise, so it is safe to leave enabled.
  es-seed:
    image: python:3.12-slim
    profiles: ["elasticsearch"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: >
      sh -c "test \"${SEED_ES:-false}\" = \"true\" || { echo 'SEED_ES not set — skipping seed'; exit 0; } &&
             pip install -q 'elasticsearch==8.17.2' &&
             python /scripts/generate_synthetic_data.py -c 1000 -o /tmp/seed.ndjson -d 30 &&
             python /scripts/upload_to_elasticsearch.py -f /tmp/seed.ndjson --host http://elasticsearch:9200 --create-index"
    restart: "no"

volumes:
  achilles-data:
  repo-cache:
  go-cache:
  esdata:
  caddy-data:
  caddy-config:
